<div class="contact">

    <div class="info">
      <h2>Contact Us</h2>
  
      <p><i class="fas fa-envelope"></i>info@glowlab.com</p>
      <p><i class="fas fa-phone"></i> Phone: +27 11 123 4567</p>
      <p><i class="fas fa-map-marker-alt"></i> Address: 123 Quince Street Johannesburg, South Africa</p>
      <p><i class="fas fa-clock"></i> Hours: Mon - Fri (9am - 5pm)</p>
    </div>
  
    <div class="form">
      <input [(ngModel)]="form.name" placeholder="Your Name">
      <input [(ngModel)]="form.email" placeholder="Email">
      <input [(ngModel)]="form.subject" placeholder="Subject">
      <textarea class="message" [(ngModel)]="form.message" placeholder="Message"></textarea>
  
      <button (click)="sendMessage()">Send Message</button>
    </div>
  
  </div>
