<div class="register">
  <h1>Register</h1>

  <div class="register-container">

    <form (ngSubmit)="register()">

      <input
        type="text"
        name="username"
        placeholder="Username"
        [(ngModel)]="user.username"
        required
      />

      <input
        type="email"
        name="email"
        placeholder="Email"
        [(ngModel)]="user.email"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Password"
        [(ngModel)]="user.password"
        required
      />

      <button type="submit">Register</button>

    </form>

  </div>
</div>
