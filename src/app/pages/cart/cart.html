<div class="cart">
    <h1>Your Cart</h1>
    <div class="cart-wrapper">
  <div class="cart-container">
  
  <div class="cart-item" *ngFor="let item of cartItems; let i = index">
  
    <img [src]="item.image">
  
    <div class="item-info">
      <h2>{{ item.name }}</h2>
      <p>R{{ item.price }}</p>
  
      <div class="qty-control">
        <button (click)="decreaseQty(i)">-</button>
  
        <span>{{ item.quantity }}</span>
  
        <button (click)="increaseQty(i)">+</button>
      </div>
  
      <p>
        Subtotal: R{{ item.price * item.quantity }}
      </p>
    </div>
  </div>
  <h2 class="total">Total: R{{ total }}</h2>
  
  <button class="checkout-btn" (click)="checkout()">
    Proceed to Checkout
  </button>
  <button class="continueshopping" (click)="shopping()">
    Continue shopping
  </button>
